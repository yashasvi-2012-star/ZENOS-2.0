<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar OS | Solar System Explorer</title>
<style>
:root {
    --bg: #01050d;
    --panel: rgba(5, 13, 26, 0.82);
    --panel-solid: #07111f;
    --line: rgba(138, 202, 255, 0.24);
    --text: #eff8ff;
    --muted: #91a5bb;
    --cyan: #67e8f9;
    --green: #8bffb0;
    --amber: #ffd166;
    --danger: #ff7b7b;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    color: var(--text);
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    background:
        linear-gradient(rgba(1, 5, 13, 0.68), rgba(1, 5, 13, 0.78)),
        url("https://images-assets.nasa.gov/image/PIA12348/PIA12348~orig.jpg") center / cover fixed,
        #01050d;
}

button {
    font: inherit;
}

.shell {
    position: fixed;
    inset: 0;
}

.topbar {
    position: fixed;
    z-index: 20;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    min-height: 66px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(2, 8, 18, 0.84);
    backdrop-filter: blur(18px);
}

.brand {
    display: flex;
    align-items: center;
    gap: 11px;
    color: #fff;
    text-decoration: none;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.mark {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(103, 232, 249, 0.7);
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0 8%, #67e8f9 9% 13%, transparent 14% 100%);
    box-shadow: 0 0 26px rgba(103, 232, 249, 0.48);
}

.toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

.tool,
.chip {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.045);
    color: var(--text);
    cursor: pointer;
}

.tool {
    min-width: 38px;
    padding: 0 11px;
    font-weight: 800;
}

.chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    color: #d9e8f6;
    font-size: 0.88rem;
}

.chip.active,
.tool:hover,
.chip:hover {
    border-color: rgba(103, 232, 249, 0.68);
    background: rgba(103, 232, 249, 0.13);
}

.readout {
    justify-self: end;
    display: flex;
    gap: 10px;
    color: var(--muted);
    font-size: 0.82rem;
    font-variant-numeric: tabular-nums;
}

.readout span {
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.035);
}

.viewport {
    position: absolute;
    inset: 66px 0 0;
    overflow: hidden;
    cursor: grab;
}

.viewport:active {
    cursor: grabbing;
}

.space {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2600px;
    height: 2600px;
    transform-origin: 0 0;
}

.starfield {
    position: absolute;
    inset: -25%;
    pointer-events: none;
    background-image:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.95) 0 1px, transparent 1.6px),
        radial-gradient(circle at 66% 16%, rgba(255,255,255,0.72) 0 1px, transparent 1.5px),
        radial-gradient(circle at 84% 64%, rgba(255,255,255,0.72) 0 1px, transparent 1.6px),
        radial-gradient(circle at 36% 78%, rgba(255,255,255,0.58) 0 1px, transparent 1.4px),
        radial-gradient(circle at 52% 44%, rgba(103,232,249,0.8) 0 1px, transparent 1.5px);
    background-size: 360px 360px, 520px 520px, 430px 430px, 680px 680px, 780px 780px;
    opacity: 0.78;
}

.orbit {
    position: absolute;
    left: 50%;
    top: 50%;
    border: 1px solid rgba(137, 202, 255, 0.18);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

.orbit.major {
    border-color: rgba(103, 232, 249, 0.24);
}

.sun {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 142px;
    height: 142px;
    border: 0;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background:
        radial-gradient(circle at 38% 36%, rgba(255,255,255,0.95), rgba(255,209,102,0.95) 15%, rgba(255,127,46,0.95) 42%, rgba(178,46,13,0.95) 72%),
        url("https://images-assets.nasa.gov/image/GSFC_20171208_Archive_e000982/GSFC_20171208_Archive_e000982~orig.jpg") center / cover;
    box-shadow: 0 0 44px rgba(255, 183, 77, 0.95), 0 0 124px rgba(255, 127, 46, 0.5);
    cursor: pointer;
}

.planet-track,
.asteroid-track,
.moon-track {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    transform-origin: 0 0;
    animation: orbit linear infinite;
}

.planet,
.asteroid,
.moon {
    position: absolute;
    border: 0;
    border-radius: 50%;
    cursor: pointer;
    background-position: center;
    background-size: cover;
    box-shadow: inset -12px -10px 16px rgba(0, 0, 0, 0.45), 0 0 14px rgba(103, 232, 249, 0.18);
}

.planet::after,
.moon::after {
    content: attr(data-name);
    position: absolute;
    left: 50%;
    top: calc(100% + 9px);
    transform: translateX(-50%);
    color: rgba(239, 248, 255, 0.82);
    font-size: 11px;
    white-space: nowrap;
    text-shadow: 0 0 8px #000;
    pointer-events: none;
}

.planet:hover,
.moon:hover,
.asteroid:hover,
.sun:hover {
    outline: 2px solid rgba(103, 232, 249, 0.72);
}

.saturn {
    overflow: visible;
}

.saturn::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 220%;
    height: 52%;
    border: 5px solid rgba(226, 206, 157, 0.74);
    border-left-color: rgba(226, 206, 157, 0.32);
    border-right-color: rgba(226, 206, 157, 0.32);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotate(-18deg);
    pointer-events: none;
}

.moon-system {
    position: absolute;
    left: 50%;
    top: 50%;
    display: none;
    pointer-events: none;
}

.moon-system.active {
    display: block;
}

.moon-orbit {
    position: absolute;
    left: 0;
    top: 0;
    border: 1px solid rgba(139, 255, 176, 0.22);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

.moon-track,
.moon {
    pointer-events: auto;
}

.asteroids {
    display: none;
}

.asteroids.active {
    display: block;
}

.asteroid {
    width: 8px;
    height: 8px;
    background: radial-gradient(circle at 35% 35%, #ded2bf, #7c7067 62%, #3c3632);
}

.panel {
    position: fixed;
    z-index: 30;
    right: 18px;
    top: 86px;
    width: min(380px, calc(100vw - 36px));
    max-height: calc(100vh - 112px);
    overflow: auto;
    border: 1px solid var(--line);
    background: var(--panel);
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
}

.panel.hidden {
    display: none;
}

.panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 16px;
    border-bottom: 1px solid var(--line);
}

.panel h2 {
    margin: 0;
    font-size: 1.45rem;
}

.type {
    margin-top: 4px;
    color: var(--cyan);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.close {
    width: 34px;
    height: 34px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    cursor: pointer;
}

.panel-image {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: #020812;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
}

.stat {
    background: rgba(5, 13, 26, 0.88);
    padding: 12px;
}

.stat span {
    display: block;
    color: var(--muted);
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.stat strong {
    display: block;
    margin-top: 5px;
    font-size: 0.95rem;
}

.facts {
    margin: 0;
    padding: 16px 18px 18px 34px;
    color: #d8e8f5;
    line-height: 1.55;
}

.left-panel {
    position: fixed;
    z-index: 24;
    left: 18px;
    bottom: 18px;
    width: min(360px, calc(100vw - 36px));
    border: 1px solid var(--line);
    background: rgba(5, 13, 26, 0.76);
    backdrop-filter: blur(18px);
}

.left-panel h2 {
    margin: 0;
    padding: 13px 14px;
    border-bottom: 1px solid var(--line);
    color: var(--cyan);
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.mission-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px;
}

.mission-list button {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.045);
    color: var(--text);
    cursor: pointer;
}

.mission-list button:hover,
.mission-list button.active {
    border-color: rgba(255, 209, 102, 0.75);
    background: rgba(255, 209, 102, 0.13);
}

.mission-path {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
}

.route-segment {
    position: absolute;
    height: 2px;
    transform-origin: left center;
    background: linear-gradient(90deg, rgba(255, 209, 102, 0), rgba(255, 209, 102, 0.95), rgba(103, 232, 249, 0));
    box-shadow: 0 0 14px rgba(255, 209, 102, 0.55);
    animation: routePulse 2.8s ease-in-out infinite;
}

.stars {
    position: absolute;
    inset: 0;
    display: none;
}

.stars.active {
    display: block;
}

.near-star {
    position: absolute;
    border: 0;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0 15%, #ffe5a3 16% 38%, rgba(255, 209, 102, 0.3) 39% 100%);
    box-shadow: 0 0 26px rgba(255, 222, 156, 0.7);
    cursor: pointer;
}

.near-star::after {
    content: attr(data-name);
    position: absolute;
    left: 50%;
    top: calc(100% + 8px);
    transform: translateX(-50%);
    color: #fff;
    font-size: 12px;
    white-space: nowrap;
    text-shadow: 0 0 9px #000;
}

.help {
    position: fixed;
    z-index: 22;
    left: 18px;
    top: 84px;
    width: min(330px, calc(100vw - 36px));
    border: 1px solid var(--line);
    background: rgba(5, 13, 26, 0.64);
    backdrop-filter: blur(16px);
    padding: 12px 14px;
    color: #cfe0ee;
    line-height: 1.5;
    font-size: 0.9rem;
}

.source {
    position: fixed;
    right: 18px;
    bottom: 14px;
    z-index: 24;
    color: rgba(218, 234, 247, 0.66);
    font-size: 0.75rem;
}

@keyframes orbit {
    to { transform: rotate(360deg); }
}

@keyframes routePulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
}

@media (max-width: 860px) {
    .topbar {
        grid-template-columns: 1fr;
        align-items: start;
    }

    .toolbar {
        justify-content: start;
    }

    .readout {
        justify-self: start;
    }

    .viewport {
        inset-top: 156px;
    }

    .help {
        display: none;
    }

    .left-panel {
        display: none;
    }
}
</style>
</head>

            <div class="stars" id="stars"></div>

    <aside class="help">

    <aside class="left-panel">

            moon("Triton", "354,800 km from Neptune", "1,353.4 km", "5.88 days", 104, 14, 12, "PIA00317", ["Likely a captured Kuiper Belt object.", "Has geyser-like plumes and a young icy surface."])
        ]
    }
];

const missions = [
    { name: "Voyager 1", launch: "1977-09-05", agency: "NASA", goals: "Jupiter, Saturn, and interstellar space.", status: "Operating in interstellar space.", route: [0, 360, 660, 860, 1320], facts: ["First spacecraft to enter interstellar space.", "Returned close-up views of Jupiter and Saturn systems."] },
    { name: "Voyager 2", launch: "1977-08-20", agency: "NASA", goals: "Grand tour of the outer planets.", status: "Operating in interstellar space.", route: [0, 660, 860, 1050, 1230], facts: ["Only spacecraft to visit Uranus and Neptune.", "Still returns heliosphere science data."] },
    { name: "New Horizons", launch: "2006-01-19", agency: "NASA", goals: "Pluto, Charon, and Kuiper Belt exploration.", status: "Extended Kuiper Belt mission.", route: [0, 470, 660, 1500], facts: ["Revealed Pluto as an active, complex world.", "Flew past Arrokoth in 2019."] },
    { name: "Cassini-Huygens", launch: "1997-10-15", agency: "NASA, ESA, ASI", goals: "Long-term Saturn system exploration.", status: "Mission ended in Saturn in 2017.", route: [0, 270, 360, 660, 860], facts: ["Huygens landed on Titan.", "Found Enceladus ocean plume material."] },
    { name: "Juno", launch: "2011-08-05", agency: "NASA", goals: "Study Jupiter's origin, interior, atmosphere, and magnetosphere.", status: "Extended Jupiter system mission.", route: [0, 360, 660], facts: ["Maps Jupiter's gravity and magnetic fields.", "Has flown by Ganymede, Europa, and Io."] },
    { name: "Parker Solar Probe", launch: "2018-08-12", agency: "NASA", goals: "Fly through the Sun's outer corona.", status: "Active solar mission.", route: [360, 270, 120, 40], facts: ["Closest human-made object to the Sun.", "Uses Venus flybys to tighten its solar orbit."] }
];

const nearbyStars = [
    { name: "Proxima Centauri", type: "Red dwarf", distance: "4.24 light-years", radius: "About 0.15 solar radii", x: 540, y: 340, size: 24, facts: ["Nearest known star to the Sun.", "Hosts at least one confirmed exoplanet."] },
    { name: "Alpha Centauri A", type: "G-type star", distance: "4.37 light-years", radius: "About 1.22 solar radii", x: 1740, y: 520, size: 38, facts: ["Part of the closest star system.", "Similar to the Sun but somewhat larger."] },
    { name: "Alpha Centauri B", type: "K-type star", distance: "4.37 light-years", radius: "About 0.86 solar radii", x: 1830, y: 620, size: 30, facts: ["Companion to Alpha Centauri A.", "Cooler and smaller than the Sun."] },
    { name: "Barnard's Star", type: "Red dwarf", distance: "5.96 light-years", radius: "About 0.20 solar radii", x: 720, y: 1880, size: 24, facts: ["Known for very high proper motion.", "A small nearby red dwarf."] },
    { name: "Sirius", type: "Binary star system", distance: "8.6 light-years", radius: "About 1.71 solar radii for Sirius A", x: 2050, y: 1760, size: 46, facts: ["Brightest star in Earth's night sky.", "Its companion Sirius B is a white dwarf."] }
];

function moon(name, distance, radius, period, orbit, size, speed, imageId, facts) {
    return {
        name,
        type: "Natural satellite",
        distance,
        radius,
        mass: "Varies by moon",
        period,
        temperature: "Cold outer Solar System surface",
        moons: 0,
        orbit,
        size,
        speed,
        image: `${imageBase}${imageId}/${imageId}~orig.jpg`,
        facts
    };
}

const viewport = document.getElementById("viewport");
const space = document.getElementById("space");
const orbitLayer = document.getElementById("orbits");
const planetLayer = document.getElementById("planets");
const asteroidLayer = document.getElementById("asteroids");
const missionPath = document.getElementById("missionPath");
const starsLayer = document.getElementById("stars");
const panel = document.getElementById("infoPanel");
const closePanel = document.getElementById("closePanel");
const zoomReadout = document.getElementById("zoomReadout");
const clock = document.getElementById("clock");
let scale = 0.62;
let panX = -1300 * scale;
let panY = -1300 * scale;
let dragging = false;
let dragStart = { x: 0, y: 0 };
let panStart = { x: 0, y: 0 };
let revealedPlanet = null;

function applyTransform() {
    space.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomReadout.textContent = `${Math.round(scale * 100)}%`;
}

function setView(nextScale, centerX = 1300, centerY = 1300) {
    const rect = viewport.getBoundingClientRect();
    scale = Math.min(1.75, Math.max(0.25, nextScale));
    panX = rect.width / 2 - centerX * scale;
    panY = rect.height / 2 - centerY * scale;
    applyTransform();
}

function revealInfo(item) {
    document.getElementById("panelTitle").textContent = item.name;
    document.getElementById("panelType").textContent = item.type;
    const image = document.getElementById("panelImage");
    image.src = item.image || "";
    image.alt = `${item.name} NASA image`;
    const stats = [
        ["Distance", item.distance],
        ["Radius", item.radius],
        ["Mass", item.mass],
        ["Orbital period", item.period],
        ["Temperature", item.temperature],
        ["Moons", String(item.moons)]
    ];
    document.getElementById("panelStats").innerHTML = stats.map(([label, value]) => `<div class="stat"><span>${label}</span><strong>${value}</strong></div>`).join("");
    document.getElementById("panelFacts").innerHTML = item.facts.map(fact => `<li>${fact}</li>`).join("");
    panel.classList.remove("hidden");
}

function createOrbit(radius, major = false) {
    const orbit = document.createElement("div");
    orbit.className = `orbit${major ? " major" : ""}`;
    orbit.style.width = `${radius * 2}px`;
    orbit.style.height = `${radius * 2}px`;
    orbitLayer.appendChild(orbit);
}

function pointOnOrbit(radius, degrees) {
    const rad = degrees * Math.PI / 180;
    return {
        x: 1300 + Math.cos(rad) * radius,
        y: 1300 + Math.sin(rad) * radius
    };
}

function createPlanets() {
    bodies.forEach((body, index) => {
        createOrbit(body.orbit, index % 2 === 0);
        const track = document.createElement("div");
        track.className = "planet-track";
        track.style.animationDuration = `${body.speed}s`;
        track.style.animationDelay = `${-body.speed * (index / bodies.length)}s`;

        const planet = document.createElement("button");
        planet.className = `planet ${body.className || ""}`;
        planet.dataset.name = body.name;
        planet.style.width = `${body.size}px`;
        planet.style.height = `${body.size}px`;
        planet.style.left = `${body.orbit - body.size / 2}px`;
        planet.style.top = `${-body.size / 2}px`;
        planet.style.backgroundImage = `url("${body.image}")`;
        planet.setAttribute("aria-label", body.name);

        if (body.moonSystem) {
            const moonSystem = document.createElement("div");
            moonSystem.className = "moon-system";
            moonSystem.style.left = `${body.orbit}px`;
            moonSystem.style.top = "0";
            body.moonSystem.forEach(moonBody => {
                const orbit = document.createElement("div");
                orbit.className = "moon-orbit";
                orbit.style.width = `${moonBody.orbit * 2}px`;
                orbit.style.height = `${moonBody.orbit * 2}px`;
                moonSystem.appendChild(orbit);

                const moonTrack = document.createElement("div");
                moonTrack.className = "moon-track";
                moonTrack.style.animationDuration = `${moonBody.speed}s`;
                const moonButton = document.createElement("button");
                moonButton.className = "moon";
                moonButton.dataset.name = moonBody.name;
                moonButton.style.width = `${moonBody.size}px`;
                moonButton.style.height = `${moonBody.size}px`;
                moonButton.style.left = `${moonBody.orbit - moonBody.size / 2}px`;
                moonButton.style.top = `${-moonBody.size / 2}px`;
                moonButton.style.backgroundImage = `url("${moonBody.image}")`;
                moonButton.setAttribute("aria-label", moonBody.name);
                moonButton.addEventListener("click", event => {
                    event.stopPropagation();
                    revealInfo(moonBody);
                });
                moonTrack.appendChild(moonButton);
                moonSystem.appendChild(moonTrack);
            });
            track.appendChild(moonSystem);
        }

        planet.addEventListener("click", event => {
            event.stopPropagation();
            if (body.moonSystem && revealedPlanet !== body.id) {
                document.querySelectorAll(".moon-system").forEach(system => system.classList.remove("active"));
                track.querySelector(".moon-system").classList.add("active");
                revealedPlanet = body.id;
                const location = pointOnOrbit(body.orbit, 0);
                setView(Math.max(scale, 0.95), location.x, location.y);
            }
            revealInfo(body);
        });

        track.appendChild(planet);
        planetLayer.appendChild(track);
    });
}

function createAsteroids() {
    for (let i = 0; i < 52; i += 1) {
        const radius = 555 + Math.random() * 55;
        const track = document.createElement("div");
        track.className = "asteroid-track";
        track.style.animationDuration = `${70 + Math.random() * 90}s`;
        track.style.animationDelay = `${-Math.random() * 120}s`;
        const asteroid = document.createElement("button");
        asteroid.className = "asteroid";
        asteroid.style.left = `${radius}px`;
        asteroid.style.top = `${-4 + (Math.random() - 0.5) * 34}px`;
        asteroid.setAttribute("aria-label", "Near-Earth object sample");
        asteroid.addEventListener("click", event => {
            event.stopPropagation();
            revealInfo({
                name: `NEO sample ${i + 1}`,
                type: "Near-Earth object layer",
                distance: "Dynamic NASA NEO feed planned",
                radius: "Small body",
                mass: "Not available",
                period: "Varies",
                temperature: "Varies",
                moons: 0,
                image: `${imageBase}PIA02477/PIA02477~orig.jpg`,
                facts: ["This layer is designed for NASA NEO API data.", "The current prototype visualizes an asteroid belt and selectable sample objects."]
            });
        });
        track.appendChild(asteroid);
        asteroidLayer.appendChild(track);
    }
}

function createStars() {
    nearbyStars.forEach(star => {
        const button = document.createElement("button");
        button.className = "near-star";
        button.dataset.name = star.name;
        button.style.left = `${star.x}px`;
        button.style.top = `${star.y}px`;
        button.style.width = `${star.size}px`;
        button.style.height = `${star.size}px`;
        button.addEventListener("click", () => revealInfo({
            ...star,
            mass: "Stellar mass varies",
            period: "Not applicable",
            temperature: "Stellar surface temperature",
            moons: 0,
            image: `${imageBase}PIA12348/PIA12348~orig.jpg`
        }));
        starsLayer.appendChild(button);
    });
}

function createMissions() {
    const list = document.getElementById("missions");
    missions.forEach(mission => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = mission.name;
        button.addEventListener("click", () => {
            document.querySelectorAll(".mission-list button").forEach(item => item.classList.remove("active"));
            button.classList.add("active");
            drawMission(mission);
            revealInfo({
                name: mission.name,
                type: "Historic space mission",
                distance: mission.goals,
                radius: "Spacecraft",
                mass: "Mission dependent",
                period: `Launch: ${mission.launch}`,
                temperature: mission.agency,
                moons: 0,
                image: `${imageBase}PIA17046/PIA17046~orig.jpg`,
                facts: [...mission.facts, `Current status: ${mission.status}`]
            });
        });
        list.appendChild(button);
    });
}

function drawMission(mission) {
    missionPath.innerHTML = "";
    const points = mission.route.map((radius, index) => pointOnOrbit(radius, index * 48 - 18));
    for (let i = 0; i < points.length - 1; i += 1) {
        const start = points[i];
        const end = points[i + 1];
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const length = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        const segment = document.createElement("div");
        segment.className = "route-segment";
        segment.style.left = `${start.x - 1300}px`;
        segment.style.top = `${start.y - 1300}px`;
        segment.style.width = `${length}px`;
        segment.style.transform = `rotate(${angle}deg)`;
        segment.style.animationDelay = `${i * 0.25}s`;
        missionPath.appendChild(segment);
    }
}

document.getElementById("sun").addEventListener("click", () => revealInfo({
    name: "Sun",
    type: "G-type main-sequence star",
    distance: "Center of the Solar System",
    radius: "696,340 km",
    mass: "1.989 x 10^30 kg",
    period: "Differential rotation: about 25-35 days",
    temperature: "Surface about 5,500 C",
    moons: 0,
    image: `${imageBase}GSFC_20171208_Archive_e000982/GSFC_20171208_Archive_e000982~orig.jpg`,
    facts: ["Contains more than 99.8% of the Solar System's mass.", "Solar activity shapes space weather.", "Parker Solar Probe is studying its corona up close."]
}));

document.getElementById("zoomIn").addEventListener("click", () => setView(scale + 0.15));
document.getElementById("zoomOut").addEventListener("click", () => setView(scale - 0.15));
document.getElementById("resetView").addEventListener("click", () => {
    revealedPlanet = null;
    document.querySelectorAll(".moon-system").forEach(system => system.classList.remove("active"));
    setView(0.62);
});

document.getElementById("asteroidToggle").addEventListener("click", event => {
    asteroidLayer.classList.toggle("active");
    event.currentTarget.classList.toggle("active");
});

document.getElementById("leaveSolar").addEventListener("click", event => {
    starsLayer.classList.toggle("active");
    event.currentTarget.classList.toggle("active");
    setView(starsLayer.classList.contains("active") ? 0.32 : 0.62);
});

closePanel.addEventListener("click", () => panel.classList.add("hidden"));

viewport.addEventListener("pointerdown", event => {
    if (event.target.closest("button")) {
        return;
    }
    dragging = true;
    viewport.setPointerCapture(event.pointerId);
    dragStart = { x: event.clientX, y: event.clientY };
    panStart = { x: panX, y: panY };
});

viewport.addEventListener("pointermove", event => {
    if (!dragging) return;
    panX = panStart.x + event.clientX - dragStart.x;
    panY = panStart.y + event.clientY - dragStart.y;
    applyTransform();
});

viewport.addEventListener("pointerup", event => {
    if (!dragging) {
        return;
    }
    dragging = false;
    viewport.releasePointerCapture(event.pointerId);
});

viewport.addEventListener("wheel", event => {
    event.preventDefault();
    const next = scale + (event.deltaY > 0 ? -0.08 : 0.08);
    setView(next);
}, { passive: false });

function updateClock() {
    clock.textContent = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
    });
}


createPlanets();
createAsteroids();
createStars();
createMissions();
setView(scale);
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
