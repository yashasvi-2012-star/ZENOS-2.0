<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StellarOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:url("space.JPG") center center/cover no-repeat;
}

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:55px;
    background:rgba(0,0,0,0.75);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:white;
    z-index:100;
    backdrop-filter:blur(8px);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:1.7rem;
    font-weight:bold;
}

.center-title{
    font-size:1.2rem;
    opacity:.9;
}

.time{
    font-size:1.2rem;
}

.hero{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.15);
}

.content{
    position:relative;
    z-index:2;
    color:white;
}

.content h1{
    font-size:7rem;
    text-shadow:0 4px 15px rgba(0,0,0,.5);
}

.content p{
    font-size:2rem;
    margin-top:10px;
    margin-bottom:35px;
}

.enter-btn{
    display:inline-block;
    padding:18px 50px;
    background:#0d8bff;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-size:1.5rem;
    transition:.3s;
}

.enter-btn:hover{
    background:#006fe0;
    transform:scale(1.05);
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">🚀 StellarOS</div>

    <div class="center-title">Home Page</div>

    <div class="time" id="clock"></div>
</nav>

<section class="hero">
    <div class="content">
        <h1>StellarOS</h1>
        <p>explore one star at a time</p>

        <!-- Replace "nextpage.html" with your page link -->
        <a href="secondpage.html" class="enter-btn">
            Enter Sky Map
        </a>
    </div>
</section>

<script>
function updateClock(){
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString();
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
